<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Url shortner</h1>
        <form id="shorten-form">
            <div>
                <label for="url">Enter URL :</label>
                <input type="url" name="url" id="url" required>
            </div>
            <div>
                <label for="shortCode">Enter shortCode :</label>
                <input type="text" name="shortCode" id="shortCode">
            </div>
            <button type="submit">Shorten</button>
        </form>

        <h2>Shortened URLs</h2>

        <ul id="shortened-urls"></ul>
    </div>

    <script>

        const fetchShortenedURL = async () => {
            const response = await fetch("/links");

            const links = await response.json();

            // console.log(links);
            const list = document.getElementById("shortened-urls");
            list.innerHTML = "";

            //looping into the object

            for(const [shortCode , url] of Object.entries(links)){
                const li = document.createElement('li');
                const truncateURL = url.length >= 30 ? `${url.slice(0,30)}... ` : url;
                li.innerHTML = `<a href="/${shortCode}" target="_blank">
                    ${window.location.origin}/${shortCode}</a> -> ${truncateURL}`                    
                list.appendChild(li);
            }
        }


        document.getElementById('shorten-form').addEventListener('submit' , async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);

            const url = formData.get('url');
            const shortCode = formData.get('shortCode');


            try{
                const response = await fetch("/shorten" , {
                    method : "POST" ,
                    headers : {"Content-type" : "application/json"},
                    body : JSON.stringify({url , shortCode})
                });

                if(response.ok){
                    fetchShortenedURL();
                    alert("Form-submitted successfully");
                }else{
                    const errorMessage = await response.text();
                    alert(errorMessage);
                }
            }
            catch(error){
                console.log(error);
            }
        });



        fetchShortenedURL();
    </script>
</body>
</html>
